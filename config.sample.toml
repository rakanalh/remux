# =============================================================================
# Remux Configuration — Complete Reference
# =============================================================================
# Place this file at ~/.config/remux/config.toml
#
# EVERY option below is shown COMMENTED OUT set to its DEFAULT value. This file
# is therefore a complete reference: copying it verbatim yields exactly the
# built-in defaults. Uncomment and edit any line to override that default.
#
# When you uncomment options, keep TOML ordering in mind: a table's own flat
# keys must appear BEFORE any of its sub-table headers. This file is already
# laid out in a valid order, so uncomment lines in place.

# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------
# [general]

# Override the default login shell. Uses the $SHELL environment variable if
# not set (default: unset).
# default_shell = "/bin/zsh"

# Maximum number of scrollback lines kept per pane (default: 10000).
# scrollback_lines = 10000

# Whether the server persists session state to disk. When true (default),
# state is written after every structural change and on shutdown. When false,
# nothing is ever written to disk and `automatic_restore` is ignored
# (default: true).
# save_sessions = true

# How persisted sessions are brought back on startup (only relevant when
# `save_sessions = true`). When true (default), persisted sessions are restored
# live automatically. When false, they are loaded as dormant/resurrectable
# entries instead and can be materialized on demand from the session manager.
# Ignored entirely when `save_sessions = false` (default: true).
# automatic_restore = true

# When true (default), mouse text selection auto-copies to the clipboard on
# release and clears the selection. When false, the selection stays visible for
# keyboard adjustment in Visual mode (default: true).
# mouse_auto_yank = true

# -----------------------------------------------------------------------------
# APPEARANCE
# -----------------------------------------------------------------------------
# [appearance]

# Where the status bar is placed: "top" | "bottom" (default: "bottom").
# status_bar_position = "bottom"

# Pane border rendering style: "zellij_style" (borders with pane names) |
# "tmux_style" (minimal dividers) (default: "zellij_style").
# border_style = "zellij_style"

# Default layout mode for new tabs: "bsp" | "master" | "monocle" | "custom"
# (default: "bsp").
# default_layout = "bsp"

# Which-key popup placement: "anchored" (bordered box centered horizontally,
# anchored to the bottom) | "centered" (bordered box centered both axes) |
# "full_width" (emacs/ivy-like panel spanning the full width, above the status
# bar row) (default: "anchored").
# which_key_position = "anchored"

# -----------------------------------------------------------------------------
# APPEARANCE - THEME
# -----------------------------------------------------------------------------
# Theme colors. Each value can be one of:
#   - A named color: "black", "red", "green", "yellow", "blue", "magenta",
#     "cyan", "white", "dark_grey", "bright_red", "bright_green",
#     "bright_yellow", "bright_blue", "bright_magenta", "bright_cyan",
#     "bright_white", "reset"
#   - A CSS hex color: "#f5e0dc", "#CBA6F7" (6-digit, case-insensitive)
#   - An ANSI 256-color index: { ansi = 235 }
#   - An RGB color: { rgb = [255, 128, 0] }
#
# The defaults below are the Catppuccin Mocha palette.
# [appearance.theme]

# Mode indicators (foreground / background per mode):
# mode_normal_fg = "#1e1e2e"
# mode_normal_bg = "#a6e3a1"
# mode_command_fg = "#1e1e2e"
# mode_command_bg = "#89b4fa"
# mode_visual_fg = "#1e1e2e"
# mode_visual_bg = "#cba6f7"
# mode_search_fg = "#1e1e2e"
# mode_search_bg = "#f9e2af"

# Pane frame:
# frame_fg = "#585b70"
# frame_bg = "#1e1e2e"
# frame_active_fg = "#89b4fa"

# Status bar:
# status_bar_fg = "#a6adc8"
# status_bar_bg = "#181825"

# Tab bar:
# tab_active_fg = "#1e1e2e"
# tab_active_bg = "#89b4fa"
# tab_inactive_fg = "#9399b2"

# Which-key popup:
# whichkey_fg = "#cdd6f4"
# whichkey_bg = "#181825"
# whichkey_key_fg = "#a6e3a1"

# Separators and labels:
# separator_fg = "#6c7086"
# pane_label_fg = "#cdd6f4"
# pane_label_bg = "#1e1e2e"
# session_name_fg = "#94e2d5"

# Search highlight colors (all matches vs. the current match):
# search_match_fg = "#1e1e2e"
# search_match_bg = "#585b70"
# search_current_fg = "#1e1e2e"
# search_current_bg = "#fab387"

# -----------------------------------------------------------------------------
# MODES - COMMAND
# -----------------------------------------------------------------------------
# [modes.command]

# Delay in milliseconds before the which-key popup appears after pressing the
# leader key (default: 500).
# timeout_ms = 500

# -----------------------------------------------------------------------------
# Keybindings — Command Mode
# -----------------------------------------------------------------------------
# Remux uses a leader key (default: Ctrl-a) to enter Command mode. In Command
# mode, keys navigate a tree of bindings. Press a group key (e.g. "t") to see
# available sub-keys in the which-key popup, then press a sub-key to execute.
#
# All other keys pass through to the inner terminal application (Normal mode).
# Press Escape in Command mode to return to Normal.
#
# Action chains: use semicolons to chain multiple actions on a single binding.
# If the chain includes "EnterNormal", you return to Normal after execution;
# otherwise you stay in Command mode for further commands.
#
# Examples:
#   n = "TabNew; EnterNormal"          — create tab and return to Normal
#   n = "PaneNew"                       — create pane and stay in Command mode
#   n = "PaneNew; ResizeRight 10"       — create pane, resize, stay in Command mode
#
# To override a default binding, redefine it here. User bindings merge on top
# of defaults — only the keys you specify are changed.
#
# To remove a default binding, set it to an empty string:
#   v = ""
#
# Commands use PascalCase names matching RemuxCommand variants (see the
# "Available Commands Reference" at the bottom of this file). Arguments are
# space-separated; quote arguments containing spaces: SessionNew "my project".
#
# NOTE: `[keybindings.normal]` is accepted as a DEPRECATED alias for
# `[keybindings.command]` (it logs a warning). Use `[keybindings.command]`.
#
# The `[keybindings.command]` table below holds the flat keys (`leader` and the
# modifier shortcuts) and MUST appear before the group sub-tables
# (`[keybindings.command.p]`, `.t`, ...).
# [keybindings.command]

# Leader key that enters Command mode (default: "Ctrl-a"). Double-tapping it
# sends the raw key through to the terminal (see the `a` binding below).
# leader = "Ctrl-a"

# --- Modifier shortcuts (checked in Normal mode) ---
# These modifier-based shortcuts are checked in Normal mode BEFORE keys are
# forwarded to the terminal, giving quick access to common operations without
# first pressing the leader key.
#
# Keys MUST include a modifier (Alt, Ctrl, ...) — plain character keys are
# reserved for the leader-key tree and are rejected here.
#
# Values can be:
#   - A command string:       "Alt-h" = "PaneFocusLeft"
#   - An action chain:        "Alt-x" = "PaneNew; PaneFocusRight"
#   - A group prefix (@key):  "Alt-p" = "@p"  (opens the Pane which-key group)
#
# The default Alt shortcuts are listed below (commented out = active by
# default). Uncomment and edit any line to change it, or set it to an empty
# string to remove a default shortcut, e.g.:  "Alt-h" = ""
#
# Focus panes directionally:
# "Alt-h" = "PaneFocusLeft"
# "Alt-j" = "PaneFocusDown"
# "Alt-k" = "PaneFocusUp"
# "Alt-l" = "PaneFocusRight"
# Move panes directionally (Alt-Shift-h/j/k/l):
# "Alt-H" = "PaneMoveLeft"
# "Alt-J" = "PaneMoveDown"
# "Alt-K" = "PaneMoveUp"
# "Alt-L" = "PaneMoveRight"
# Tab navigation and direct jumps:
# "Alt-," = "TabPrev"
# "Alt-." = "TabNext"
# "Alt-1" = "TabGoto 0"
# "Alt-2" = "TabGoto 1"
# "Alt-3" = "TabGoto 2"
# "Alt-4" = "TabGoto 3"
# "Alt-5" = "TabGoto 4"
# "Alt-6" = "TabGoto 5"
# "Alt-7" = "TabGoto 6"
# "Alt-8" = "TabGoto 7"
# "Alt-9" = "TabGoto 8"
# Misc quick actions:
# "Alt-t" = "TabNew"
# "Alt-s" = "SessionQuickSwitch"
# "Alt-o" = "SessionSwitchLast"
# "Alt-z" = "PaneToggleZoom"
# "Alt-Space" = "LayoutNext"

# --- Command-mode leader tree (defaults) ---
# The tables below mirror the built-in leader (Ctrl-a) tree. They are shown for
# reference; user bindings merge on top of the defaults, so you only need to
# redefine the keys you want to change. `_label` sets the which-key group name.

# --- Pane (p) ---
# [keybindings.command.p]
# _label = "Pane"
# n = "PaneNew; EnterNormal"
# x = "PaneClose; EnterNormal"
# v = "PaneSplitVertical; EnterNormal"
# s = "PaneSplitHorizontal; EnterNormal"
# h = "PaneFocusLeft; EnterNormal"
# j = "PaneFocusDown; EnterNormal"
# k = "PaneFocusUp; EnterNormal"
# l = "PaneFocusRight; EnterNormal"
# H = "PaneMoveLeft; EnterNormal"
# J = "PaneMoveDown; EnterNormal"
# K = "PaneMoveUp; EnterNormal"
# L = "PaneMoveRight; EnterNormal"
# z = "PaneToggleZoom; EnterNormal"
# r = "PaneRename"
# a = "PaneStackAdd; EnterNormal"
# "]" = "PaneStackNext; EnterNormal"
# "[" = "PaneStackPrev; EnterNormal"

# Unbind a default key by mapping it to an empty string:
# [keybindings.command.p]
# s = ""     # removes the default Prefix+p s binding (split horizontal)

# --- Resize (p -> R) ---
# [keybindings.command.p.R]
# _label = "Resize"
# h = "ResizeLeft 5"
# j = "ResizeDown 5"
# k = "ResizeUp 5"
# l = "ResizeRight 5"

# --- Tab (t) ---
# [keybindings.command.t]
# _label = "Tab"
# n = "TabNew; EnterNormal"
# x = "TabClose; EnterNormal"
# r = "TabRename"
# "]" = "TabNext; EnterNormal"
# "[" = "TabPrev; EnterNormal"
# m = "TabMove"
# "1" = "TabGoto 0; EnterNormal"
# "2" = "TabGoto 1; EnterNormal"
# "3" = "TabGoto 2; EnterNormal"
# "4" = "TabGoto 3; EnterNormal"
# "5" = "TabGoto 4; EnterNormal"
# "6" = "TabGoto 5; EnterNormal"
# "7" = "TabGoto 6; EnterNormal"
# "8" = "TabGoto 7; EnterNormal"
# "9" = "TabGoto 8; EnterNormal"

# --- Session (x) ---
# [keybindings.command.x]
# _label = "Session"
# s = "SessionQuickSwitch"
# o = "SessionSwitchLast"
# n = "SessionNew"
# r = "SessionRename"
# d = "SessionDetach"
# m = "OpenSessionManager"
# f = "SessionMoveToFolder"

# --- Search (s) ---
# [keybindings.command.s]
# _label = "Search"
# s = "EnterSearchMode"
# e = "BufferEditInEditor"

# --- Direct bindings (root level) ---
# These are top-level keys pressed right after the leader, not inside a group.
# They live directly under [keybindings.command] as single-character keys.
# Defaults:
#   v     = "EnterVisualMode"                — enter Visual (scrollback) mode
#   g     = "ToggleStyle; EnterNormal"       — toggle border style
#   Space = "LayoutNext; EnterNormal"        — cycle layout (key is a literal space)
#   f     = "PaneToggleZoom; EnterNormal"    — zoom the focused pane
#   ":"   = "CommandPaletteOpen"             — open the command palette
#   a     = "SendKey Ctrl-a; EnterNormal"    — send the prefix key to the terminal
#   "}"   = "TabNext; EnterNormal"           — quick next tab
#   "{"   = "TabPrev; EnterNormal"           — quick prev tab
#
# To place these under [keybindings.command], put them ABOVE the group
# sub-tables above, e.g.:
#   v = "EnterVisualMode"

# -----------------------------------------------------------------------------
# Keybindings — Visual Mode
# -----------------------------------------------------------------------------
# Visual mode overrides (tree-based, same format as command mode). Visual mode
# has built-in keys for scrollback navigation (j/k, gg, G, Ctrl-d/u, v/V for
# selection, y to yank, / to search, e to open editor). Press Escape to return
# to Normal. Add overrides here if needed. Defaults to empty.
# [keybindings.visual]


# -----------------------------------------------------------------------------
# Keybindings — Session Manager
# -----------------------------------------------------------------------------
# Two-key (vim-style) chords for the session-manager overlay. Each entry maps a
# chord string (1-2 printable chars) to one of the actions below. The chord's
# target is decided by the currently selected tree row (e.g. `tr` renames the
# selected tab, `sx` closes the selected session).
#
# The values below are also the DEFAULTS when this section is absent. Entries
# you add here override or extend the defaults. Existing hardcoded overlay keys
# (Enter, arrows, j/k, h/l, n/c/m/d, q) are preserved — chords are checked first
# and fall through to those on no match.
#
# Rules:
#   • A chord is 1-2 printable characters; invalid chords are skipped (warned).
#   • Unknown action names are skipped (warned).
#   • If a char begins any 2-char chord it is a "prefix"; a single-char binding
#     using that same char is dropped (prefix wins).
#   • An empty value ("") unbinds a (possibly default) chord.
#
# Actions: TabNew, TabClose, TabRename, TabMoveLeft, TabMoveRight, PaneNew,
#          PaneClose, PaneRename, SessionNew, SessionClose, SessionRename,
#          SessionMove, FolderNew, FolderDelete, FolderRename.
#
# [keybindings.session_manager]
# tn = "TabNew"
# tx = "TabClose"
# tr = "TabRename"
# th = "TabMoveLeft"
# tl = "TabMoveRight"
# pn = "PaneNew"
# px = "PaneClose"
# pr = "PaneRename"
# sn = "SessionNew"
# sx = "SessionClose"
# sr = "SessionRename"
# sm = "SessionMove"
# fn = "FolderNew"
# fx = "FolderDelete"
# fr = "FolderRename"


# =============================================================================
# Available Commands Reference
# =============================================================================
#
# Tab commands:
#   TabNew                          — Create a new tab
#   TabClose                        — Close the active tab
#   TabGoto <index>                 — Jump to tab by 0-based index
#   TabNext                         — Focus next tab
#   TabPrev                         — Focus previous tab
#   TabMove [index]                 — Move tab to position (default: 0)
#   TabRename <name>                — Rename the active tab
#
# Pane commands:
#   PaneNew                         — Create a new pane
#   PaneClose                       — Close the focused pane
#   PaneSplitVertical               — Split focused pane vertically
#   PaneSplitHorizontal             — Split focused pane horizontally
#   PaneFocusLeft                   — Focus pane to the left
#   PaneFocusRight                  — Focus pane to the right
#   PaneFocusUp                     — Focus pane above
#   PaneFocusDown                   — Focus pane below
#   PaneMoveLeft                    — Move focused pane left
#   PaneMoveRight                   — Move focused pane right
#   PaneMoveUp                      — Move focused pane up
#   PaneMoveDown                    — Move focused pane down
#   PaneStackAdd                    — Add focused pane to a stack
#   PaneStackNext                   — Focus next pane in stack
#   PaneStackPrev                   — Focus previous pane in stack
#   PaneToggleZoom                  — Toggle zoom (fullscreen) for the focused pane
#   PaneRename <name>               — Rename the focused pane
#
# Session commands:
#   SessionNew <name> [folder]      — Create a new session
#   SessionQuickSwitch              — Open the quick session switcher
#   SessionSwitchLast               — Toggle to the previously-attached session
#   SessionDetach                   — Detach from the current session
#   SessionRename <name>            — Rename the current session
#   SessionMoveToFolder             — Move the current session to a folder
#   OpenSessionManager              — Open the full session manager
#   SessionList                     — List all sessions
#   SessionSave                     — Save session state to disk
#
# Folder commands:
#   FolderNew <name>                — Create a new folder
#   FolderDelete <name>             — Delete a folder
#   FolderList                      — List all folders
#   FolderMoveSession <sess> [dir]  — Move a session to a folder
#
# Search commands:
#   EnterSearchMode                 — Enter search mode (search scrollback)
#   BufferEditInEditor              — Open scrollback in an external editor
#
# Resize commands:
#   ResizeLeft [amount]             — Resize pane left (default: 1)
#   ResizeRight [amount]            — Resize pane right (default: 1)
#   ResizeUp [amount]               — Resize pane up (default: 1)
#   ResizeDown [amount]             — Resize pane down (default: 1)
#
# Mode commands:
#   EnterNormal                     — Return to Normal (keys go to the terminal)
#   EnterCommandMode                — Enter Command mode (navigate keybindings)
#   EnterVisualMode                 — Enter Visual mode (scrollback selection)
#   SendKey <key-notation>          — Send a key (e.g. "Ctrl-a") to the active PTY
#   CommandPaletteOpen              — Open the command palette
#
# Layout commands:
#   ToggleStyle                     — Toggle border style between zellij and tmux
#   LayoutNext                      — Cycle through layout modes (BSP -> Master -> Monocle)
#   SetMaster                       — Set the focused pane as the master pane
#
# Remote commands:
#   RemoteConnect <dest|alias>      — Connect to a remote server (SSH destination
#                                     or a `[remotes.<name>]` alias)

# -----------------------------------------------------------------------------
# REMOTES
# -----------------------------------------------------------------------------
# Named remote Remux servers reachable over SSH. Each `[remotes.<name>]` table
# adds a top-level node to the session manager tree; expanding it lazily
# connects over SSH (spawning `<remux_path> relay` on the remote) and lists that
# server's sessions. Attaching to a remote session hands the foreground render
# loop over to the remote transport — remote sessions feel like local ones.
#
# Remote nodes support expand (connect) and switch-to-session/tab/pane only.
# Structural edits (create/delete/rename/move) remain local-only.
#
# Per-remote fields:
#   ssh         — SSH destination, e.g. "user@host" (relies on ~/.ssh/config). Required.
#   remux_path  — path to the remux binary on the remote (default: "remux").
#   port        — optional SSH port passed as `-p` (default: unset).
#   identity    — optional identity file passed as `-i` (default: unset).
#   extra_args  — extra ssh arguments placed before the destination (default: []).
#   auto_connect — connect this remote automatically at client startup instead
#                  of lazily on demand (default: false).
#
# [remotes.pi]
# ssh = "pi@raspberrypi.local"
# remux_path = "/usr/local/bin/remux"
# auto_connect = true                 # auto-resume this connection on start
#
# [remotes.server]
# ssh = "user@example.com"
# port = 2222
# identity = "~/.ssh/id_ed25519"
# extra_args = ["-o", "StrictHostKeyChecking=no"]
