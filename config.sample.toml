# =============================================================================
# Remux Configuration
# =============================================================================
# Place this file at ~/.config/remux/config.toml
# All values below show their defaults. Uncomment and modify as needed.

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

[general]
# Override the default login shell. Uses $SHELL if not set.
# default_shell = "/bin/zsh"

# Maximum number of scrollback lines per pane.
scrollback_lines = 10000

# Automatically save and restore sessions across server restarts.
# State is saved after every structural change and restored on startup.
automatic_restore = true

# When true (default), mouse text selection auto-copies to clipboard on release
# and clears the selection. When false, selection stays visible for keyboard
# adjustment in Visual mode.
mouse_auto_yank = true

# -----------------------------------------------------------------------------
# Appearance
# -----------------------------------------------------------------------------

[appearance]
# Where the status bar is placed: "top" or "bottom".
status_bar_position = "bottom"

# Pane border rendering style: "zellij_style" (borders, pane names) or "tmux_style" (minimal dividers).
border_style = "zellij_style"

# Default layout mode for new tabs: "bsp", "master", "monocle", or "custom"
# default_layout = "bsp"

# Theme colors. Values can be:
#   - A named color string: "black", "red", "green", "yellow", "blue", "magenta",
#     "cyan", "white", "dark_grey", "bright_red", "bright_green", "bright_blue",
#     "bright_magenta", "bright_cyan", "reset"
#   - An ANSI 256-color index: { ansi = 235 }
#   - An RGB color: { rgb = [255, 128, 0] }
#
# [appearance.theme]
# mode_normal_fg = "black"
# mode_normal_bg = "bright_green"
# mode_command_fg = "black"
# mode_command_bg = "bright_blue"
# mode_visual_fg = "black"
# mode_visual_bg = "bright_magenta"
# frame_fg = { ansi = 8 }
# frame_bg = "reset"
# frame_active_fg = { ansi = 2 }
# status_bar_fg = { ansi = 243 }
# status_bar_bg = { ansi = 235 }
# tab_active_fg = { ansi = 0 }
# tab_active_bg = { ansi = 6 }
# tab_inactive_fg = { ansi = 245 }
# whichkey_fg = { ansi = 252 }
# whichkey_bg = { ansi = 235 }
# whichkey_key_fg = { ansi = 10 }
# separator_fg = { ansi = 240 }
# pane_label_fg = { ansi = 0 }
# pane_label_bg = { ansi = 0 }
# session_name_fg = { ansi = 6 }

# -----------------------------------------------------------------------------
# Modes
# -----------------------------------------------------------------------------

[modes.command]
# Timeout in milliseconds before the which-key popup appears.
timeout_ms = 500

# -----------------------------------------------------------------------------
# Keybindings — Command Mode
# -----------------------------------------------------------------------------
# Remux uses a leader key (default: Ctrl-a) to enter Command mode. In Command
# mode, keys navigate a tree of bindings. Press a group key (e.g. "t") to see
# available sub-keys in the which-key popup, then press a sub-key to execute.
#
# All other keys pass through to the inner terminal application (Normal).
# Press Escape in Command mode to return to Normal.
#
# Action chains: Use semicolons to chain multiple actions on a single binding.
# If the chain includes "EnterNormal", you return to Normal after
# execution. Otherwise, you stay in Command mode for further commands.
#
# Examples:
#   n = "TabNew; EnterNormal"     — Create tab and return to normal
#   n = "PaneNew"                      — Create pane and stay in command mode
#   n = "PaneNew; ResizeRight 10"      — Create pane, resize, stay in command mode
#
# To override a default binding, redefine it here. User bindings merge on top
# of defaults — only the keys you specify are changed.
#
# To remove a default binding, set it to an empty string:
#   v = ""
#
# Commands use PascalCase names matching RemuxCommand variants.
# Arguments are space-separated. Quote strings with spaces: "SessionNew \"my project\""

# Leader key (default: Ctrl-a). Double-tap sends the raw key to the terminal.
leader = "Ctrl-a"

# --- Modifier shortcuts (Normal mode) ---
# These modifier-based shortcuts are checked in Normal mode before keys are
# forwarded to the terminal. They provide quick access to common operations
# without pressing the leader key first.
#
# Keys MUST include a modifier (Alt, Ctrl, etc.) — plain character keys go
# through the leader key tree instead.
#
# Values can be:
#   - A command string:       "Alt-h" = "PaneFocusLeft"
#   - An action chain:        "Alt-x" = "PaneNew; PaneFocusRight"
#   - A group prefix (@key):  "Alt-p" = "@p"  (opens the Pane which-key group)
#
# Group prefixes enter Command mode at the specified keybinding tree group,
# showing the which-key popup for that group immediately.
#
# To remove a default shortcut, set it to an empty string:
#   "Alt-h" = ""
"Alt-h" = "PaneFocusLeft"
"Alt-j" = "PaneFocusDown"
"Alt-k" = "PaneFocusUp"
"Alt-l" = "PaneFocusRight"
"Alt-n" = "TabNext"
"Alt-p" = "@p"                         # Open Pane group (which-key)
"Alt-t" = "@t"                         # Open Tab group (which-key)

# --- Tab (t) ---
[keybindings.command.t]
_label = "Tab"
n = "TabNew; EnterNormal"
c = "TabClose; EnterNormal"
m = "TabMove"
r = "TabRename"
l = "TabNext"                       # list / cycle tabs

# --- Pane (p) ---
[keybindings.command.p]
_label = "Pane"
n = "PaneNew; EnterNormal"
c = "PaneClose; EnterNormal"
s = "PaneSplitVertical; EnterNormal"
S = "PaneSplitHorizontal; EnterNormal"
h = "PaneFocusLeft; EnterNormal"
j = "PaneFocusDown; EnterNormal"
k = "PaneFocusUp; EnterNormal"
l = "PaneFocusRight; EnterNormal"
a = "PaneStackAdd"
"]" = "PaneStackNext"
"[" = "PaneStackPrev"
R = "PaneRename"

# --- Search (s) ---
[keybindings.command.s]
_label = "Search"
s = "EnterSearchMode"
e = "BufferEditInEditor"

# --- Session (x) ---
[keybindings.command.x]
_label = "Session"
n = "SessionNew"
d = "SessionDetach"
r = "SessionRename"
l = "SessionList"

# --- Folder (f) ---
[keybindings.command.f]
_label = "Folder"
n = "FolderNew"
d = "FolderDelete"
l = "FolderList"
m = "FolderMoveSession"

# --- Resize (p → r) ---
[keybindings.command.p.r]
_label = "Resize"
h = "ResizeLeft 5"
j = "ResizeDown 5"
k = "ResizeUp 5"
l = "ResizeRight 5"

# --- Direct bindings (root level) ---
# These are top-level keys, not inside a group.
# Uncomment to override:
# v = "EnterVisualMode"
# g = "ToggleStyle"
# Space = "LayoutNext"
# m = "SetMaster"

# -----------------------------------------------------------------------------
# Keybindings — Visual Mode
# -----------------------------------------------------------------------------
# Visual mode overrides (tree-based, same format as command mode).
# Visual mode has built-in keys for scrollback navigation (j/k, gg, G, Ctrl-d/u,
# v/V for selection, y to yank, / to search, e to open editor).
# Press Escape to return to Normal.
# Add overrides here if needed.

# [keybindings.visual]


# =============================================================================
# Available Commands Reference
# =============================================================================
#
# Tab commands:
#   TabNew                          — Create a new tab
#   TabClose                        — Close the active tab
#   TabGoto <index>                 — Jump to tab by index (1-based)
#   TabNext                         — Focus next tab
#   TabPrev                         — Focus previous tab
#   TabMove <index>                 — Move tab to position (1-based)
#   TabRename <name>                — Rename the active tab
#
# Pane commands:
#   PaneNew                         — Create a new pane
#   PaneClose                       — Close the focused pane
#   PaneSplitVertical               — Split focused pane vertically
#   PaneSplitHorizontal             — Split focused pane horizontally
#   PaneFocusLeft                   — Focus pane to the left
#   PaneFocusRight                  — Focus pane to the right
#   PaneFocusUp                     — Focus pane above
#   PaneFocusDown                   — Focus pane below
#   PaneStackAdd                    — Add focused pane to a stack
#   PaneStackNext                   — Focus next pane in stack
#   PaneStackPrev                   — Focus previous pane in stack
#   PaneRename <name>               — Rename the focused pane
#
# Session commands:
#   SessionNew <name> [folder]      — Create a new session
#   SessionDetach                   — Detach from current session
#   SessionRename <name>            — Rename current session
#   SessionList                     — List all sessions
#   SessionSave                     — Save session state
#
# Folder commands:
#   FolderNew <name>                — Create a new folder
#   FolderDelete <name>             — Delete a folder
#   FolderList                      — List all folders
#   FolderMoveSession <sess> [dir]  — Move a session to a folder
#
# Search commands:
#   EnterSearchMode                 — Enter search mode (search scrollback)
#   BufferEditInEditor              — Open scrollback in external editor
#
# Resize commands:
#   ResizeLeft [amount]             — Resize pane left (default: 1)
#   ResizeRight [amount]            — Resize pane right (default: 1)
#   ResizeUp [amount]               — Resize pane up (default: 1)
#   ResizeDown [amount]             — Resize pane down (default: 1)
#
# Mode commands:
#   EnterNormal                — Return to normal (keys go to terminal)
#   EnterCommandMode                — Enter command mode (navigate keybindings)
#   EnterVisualMode                 — Enter visual mode (scrollback selection)
#   SendKey <bytes>                 — Send raw key bytes to the active PTY
#
# Layout commands:
#   ToggleStyle                     — Toggle border style between zellij and tmux
#   LayoutNext                      — Cycle through layout modes (BSP → Master → Monocle)
#   SetMaster                       — Set the focused pane as the master pane
